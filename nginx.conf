# /etc/nginx/sites-available/pdf_magic
# Remplacez VOTRE_DOMAINE par votre domaine ou IP

server {
    listen 80;
    server_name VOTRE_DOMAINE;

    # Redirection HTTP → HTTPS (décommentez si vous avez un certificat SSL)
    # return 301 https://$host$request_uri;

    client_max_body_size 55M;  # doit correspondre à DATA_UPLOAD_MAX_MEMORY_SIZE

    # ── Frontend (fichiers statiques) ──────────────────────────────────────────
    location / {
        root /var/www/pdf_magic;          # dossier où vous mettez le HTML
        index index.html;
        try_files $uri $uri/ =404;
    }

    # ── Backend Django via Gunicorn ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Fichiers statiques Django ──────────────────────────────────────────────
    location /static/ {
        alias /home/ubuntu/pdf_magic/staticfiles/;
    }
}

